# Production stack for the QuantBot system (Ubuntu / EC2).
#
#   cd /home/ubuntu/dev/quantbot
#   cp deploy/.env.example .env   # fill in BYBIT keys; set BOT_MODE
#   bash deploy/deploy.sh
#
# Ports bind to 127.0.0.1 only; the host nginx (deploy/nginx/quantbot.conf, :8090)
# is the public entry point. Bot + API talk to postgres/redis over the compose
# network by service name. The bot boots to STANDBY and never trades until a START
# command, even in LIVE mode (arch §3.4).
name: quantbot

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quantbot
      POSTGRES_PASSWORD: quantbot
      POSTGRES_DB: quantbot
    volumes:
      - quantbot-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantbot"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  bot:
    build:
      context: ..
      dockerfile: Dockerfile
    image: quantbot-app
    command: python -m apps.bot.main
    env_file: ../.env
    environment:
      QUANTBOT_CONFIG: config/quantbot.yaml
      LOG_DIR: /app/logs
    volumes:
      - ../logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 30s

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    image: quantbot-app
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
    env_file: ../.env
    environment:
      QUANTBOT_CONFIG: config/quantbot.yaml
      LOG_DIR: /app/logs
    volumes:
      - ../logs:/app/logs
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    image: quantbot-web
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  quantbot-pgdata:
