# Host (EC2) nginx — public entry point for quantbot on :8090. Forwards
# everything (SPA, /api, /ws) to the web container (127.0.0.1:8080), which does
# the internal routing (nginx.conf in the web image). WebSocket upgrade is passed
# through for /ws/dashboard.
#
# Installed by deploy/deploy.sh -> /etc/nginx/sites-enabled/quantbot.conf.
# Access the dashboard at http://<EC2-ip>:8090/ (open 8090 in the security group).
# Port 8090 (not 80) because another service already uses 80 on this host.

map $http_upgrade $quantbot_connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8090;
    listen [::]:8090;
    server_name _;

    client_max_body_size 4m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $quantbot_connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }
}
