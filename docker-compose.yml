services:
  postgres:
    image: postgres:16-alpine
    container_name: quantbot-postgres
    environment:
      POSTGRES_USER: quantbot
      POSTGRES_PASSWORD: quantbot
      POSTGRES_DB: quantbot
    ports:
      # Host 5433 (not 5432) to avoid clashing with a pre-existing local Postgres.
      - "5433:5432"
    volumes:
      - quantbot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantbot"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: quantbot-redis
    ports:
      # Host 6380 (not 6379) to avoid clashing with a pre-existing local Redis.
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  quantbot_pgdata:
