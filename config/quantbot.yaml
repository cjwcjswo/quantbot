bot:
  mode: "LIVE"
  account_currency: "USDT"
  category: "linear"
  quote_coin: "USDT"
  start_state: "STANDBY"
  max_active_positions: 5
  max_symbols_to_watch: 20
  heartbeat_interval_sec: 5

exchange:
  name: "bybit"
  use_testnet: false
  recv_window: 5000
  use_pybit: true

paper:
  initial_balance_usdt: 10000
  all_orders_as_market: true
  market_slippage_percent: 0.03
  taker_fee_percent: 0.055
  funding_fee_enabled: false

universe:
  include_quote_coin: "USDT"
  min_24h_turnover_usdt: 20000000
  exclude_new_listing_days: 7
  exclude_symbols: []
  include_symbols: []

scanner:
  refresh_interval_sec: 180
  max_candidates: 20
  atr_prefilter_multiple: 3
  atr_refresh_budget: 30
  atr_cache_ttl_sec: 900
  kline_1m_refresh_sec: 25
  kline_5m_refresh_sec: 120
  kline_15m_refresh_sec: 300
  min_atr_percent: 0.15
  max_atr_percent: 7.0
  max_spread_percent: 0.10
  min_orderbook_depth_usdt_0_1_percent: 100000
  min_orderbook_depth_usdt_0_3_percent: 300000

trend_quality:
  long_rsi_min_5m: 50
  long_rsi_max_5m: 68
  short_rsi_min_5m: 32
  short_rsi_max_5m: 50
  min_ema_gap_percent_15m: 0.10
  min_ema20_slope_atr_15m: 0.03
  min_close_distance_from_ema20_atr_15m: 0.05
  score_gap_high_percent_15m: 0.30
  score_slope_high_atr_15m: 0.10
  score_volume_high_ratio_5m: 1.2
  score_low_atr_percent_5m: 3.0

volume:
  min_setup_volume_ratio: 0.6
  min_breakout_volume_ratio: 1.3
  max_exhaustion_volume_ratio: 4.0

candle_quality:
  max_rejection_wick_ratio: 0.45
  max_opposite_wick_ratio_for_breakout: 0.38
  min_body_ratio_for_breakout: 0.40
  long_min_close_position_in_range: 0.70
  short_max_close_position_in_range: 0.30

entry:
  enabled_modes:
    pre_breakout_scout: true
    breakout_confirm: true
    retest_confirm: true

  pre_breakout:
    min_score: 6
    position_fraction: 0.30
    stop_atr: 0.7
    min_volume_ratio: 0.55
    max_distance_to_box_atr: 0.65
    require_compression: false
    compression_bonus_score: 2
    compression_min_score: 5
    no_compression_min_score: 6
    compression_position_fraction: 0.25
    no_compression_position_fraction: 0.15
    long_rsi_min: 44
    long_rsi_max: 68
    short_rsi_min: 32
    short_rsi_max: 58
    score_gap_high_percent_15m: 0.30
    score_slope_high_atr_15m: 0.10
    score_long_rsi_center_min: 50
    score_long_rsi_center_max: 60
    score_short_rsi_center_min: 40
    score_short_rsi_center_max: 50
    score_near_box_atr: 0.20
    score_mid_box_atr: 0.35
    score_compression_ratio: 0.8
    score_high_volume_ratio: 2.0

  breakout_confirm:
    position_fraction: 0.30
    volume_min_ratio: 1.3
    require_close_beyond_boundary: false
    close_beyond_boundary_atr: 0.03
    stop_atr: 1.0

  retest_confirm:
    position_fraction: 0.40
    retest_tolerance_atr: 0.35
    max_wait_candles: 10
    stop_atr: 1.3

  anti_chase:
    enabled: true
    max_rsi_long: 70
    min_rsi_short: 30
    max_distance_from_ema20_atr: 1.5
    max_recent_3_candle_move_atr: 2.0
    max_single_candle_move_atr: 1.2
    exhaustion_volume_ratio: 4.0

volatility_adaptive_stop:
  enabled: true
  retest_atr_percent_tiers:
    - max_atr_percent: 0.25
      stop_atr: 1.0
    - max_atr_percent: 0.60
      stop_atr: 1.3
    - max_atr_percent: 999.0
      stop_atr: 1.5

structure_stop:
  enabled: true
  apply_to_entry_modes:
    - "RETEST_CONFIRM"
  buffer_atr: 0.10
  max_stop_distance_atr: 1.8
  min_stop_distance_atr: 0.5
  use_structure_stop_for_retest: true

orders:
  live_new_entry_market_order_allowed: false
  scout_order_type: "LIMIT"
  breakout_order_type: "AGGRESSIVE_LIMIT"
  retest_order_type: "LIMIT"
  max_slippage_percent: 0.08
  limit_order_ttl_sec: 10
  scout_limit_order_ttl_sec: 45
  retest_limit_order_ttl_sec: 20
  limit_reorder_attempts: 1
  aggressive_limit_time_in_force: "IOC"
  use_reduce_only_for_exits: true
  pre_order_depth_multiple: 3.0
  pre_order_depth_band_percent: 0.1
  partial_fill_min_ratio_to_keep: 0.70
  partial_fill_below_min_action: "CLOSE_FILLED_QTY"

risk:
  account_risk_per_trade_percent: 1.0
  daily_max_loss_percent: 5.0
  intraday_drawdown_percent: 3.0
  max_symbol_risk_percent: 1.0
  max_total_open_risk_percent: 5.0
  max_same_direction_positions: 4
  min_leverage: 1
  scout_max_leverage: 3
  breakout_max_leverage: 5
  retest_max_leverage: 6
  high_quality_max_leverage: 8
  high_atr_max_leverage: 3
  high_atr_derisk_threshold_percent: 3.5
  consecutive_loss_derisk_count: 2
  consecutive_loss_max_leverage: 3
  daily_loss_derisk_percent: 3.0
  daily_loss_max_leverage: 2
  min_stop_distance_atr: 0.5
  max_stop_distance_atr: 1.5
  retest_max_stop_distance_atr: 1.8
  isolated_margin: true

liquidation_guard:
  min_liquidation_distance_percent: 2.0
  min_liquidation_distance_atr: 2.0
  block_if_liq_price_inside_stop: true

tpsl:
  initial_take_profit_r: 2.0
  use_exchange_sl: true
  use_exchange_tp: false
  use_exchange_tpsl: true
  tp_trigger_by: "LastPrice"
  sl_trigger_by: "LastPrice"
  tpsl_mode: "Full"

position_protection:
  stop_mode: "EXCHANGE_TPSL"
  require_tpsl_after_entry: true
  max_seconds_position_without_tpsl: 3
  emergency_close_if_tpsl_missing: true
  verify_tpsl_after_entry: true
  verify_tpsl_retry_count: 3
  verify_tpsl_retry_interval_sec: 1
  tpsl_verify_tolerance_percent: 0.02

position:
  partial_take_profit_r: 2.0
  partial_take_profit_fraction: 0.50
  trailing_start_r: 2.0
  trailing_atr_multiplier: 2.0
  trailing_extended_after_r: 5.0
  trailing_extended_atr_multiplier: 2.5
  max_holding_minutes: 180
  sync_exchange_sl_with_trailing: true
  min_exchange_sl_update_interval_sec: 5
  runner_mode:
    enabled: true
    activate_after_partial_tp: true
    activate_min_r: 2.0
    weak_trend_trailing_atr: 2.0
    strong_trend_trailing_atr: 2.8
    very_strong_trend_trailing_atr: 3.2
    strong_trend_min_r: 2.0
    very_strong_trend_min_r: 5.0
    require_5m_trend_hold: true
    require_1m_ema20_hold: true
    long_min_1m_rsi: 50
    short_max_1m_rsi: 50
    tighten_on_1m_ema20_break_bars: 2
    tighten_on_strong_opposite_candle: true
    min_trailing_update_interval_sec: 5
    min_trailing_improvement_atr: 0.20
    log_post_exit_mfe: true
    post_exit_mfe_windows_min:
      - 5
      - 15
      - 30
  scout_management:
    enabled: true
    grace_bars: 6
    confirmation_boundary_atr: 0.03
    confirmation_volume_ratio: 1.1
    min_hold_bars_before_defensive_reduce: 3
    warning_confirm_bars: 2
    max_defensive_reductions: 1
    defensive_reduce_fraction: 0.50
    invalidate_on_box_mid_reclaim: true
    invalidate_on_ema20_reclaim_bars: 2
    long_invalid_rsi_threshold: 45
    short_invalid_rsi_threshold: 55
    strong_opposite_candle_body_ratio: 0.55
    strong_opposite_candle_volume_ratio: 1.5
    catastrophic_opposite_candle_body_ratio: 0.75
    catastrophic_opposite_candle_volume_ratio: 3.0
    catastrophic_opposite_move_atr: 1.2
    convert_to_active_on_confirmation: true

stagnation_exit:
  enabled: true
  pre_breakout_scout:
    max_bars_without_breakout: 8
  breakout_confirm:
    reduce_after_bars: 5
    reduce_fraction: 0.5
    max_bars_without_1r: 10
  retest_confirm:
    tighten_after_bars: 6
    max_bars_without_1r: 12

cooldown:
  symbol_cooldown_after_loss_min: 15
  symbol_cooldown_after_2_losses_min: 60
  global_cooldown_after_3_losses_min: 30
  entry_mode_cooldown_after_loss_min: 20

global_kill_switch:
  daily_loss_percent: 5.0
  intraday_drawdown_percent: 3.0
  consecutive_losses: 4
  order_failures_in_5min: 3
  websocket_disconnects_in_10min: 3
  unexpected_position_mismatch_count: 1
  emergency_close_failure_count: 1
  max_slippage_percent_breach_count: 2

reconciliation:
  interval_sec_when_flat: 10
  interval_sec_when_position_open: 3
  interval_sec_after_order_event: 1
  run_on_startup: true
  run_after_ws_reconnect: true
  run_after_order_timeout: true
  source_of_truth: "exchange"

manual_intervention:
  allow_external_orders: true
  pause_new_entries_on_external_change: true
  pause_seconds_after_external_change: 60
  adopt_external_positions: true
  manage_adopted_positions: false
  cancel_external_open_orders: false

data_quality:
  max_kline_delay_sec: 30
  max_ticker_delay_sec: 30
  max_orderbook_delay_sec: 3
  max_missing_candles: 1
  block_if_candle_gap_detected: true
  max_ticker_kline_price_divergence_percent: 0.5

clock_sync:
  max_time_drift_ms: 500
  sync_interval_sec: 60
  block_trading_if_drift_ms_above: 1000

api_rate_limit:
  max_rest_requests_per_second: 2
  max_order_requests_per_second: 2
  backoff_base_sec: 1
  backoff_max_sec: 30

api:
  app_env: "production"
  api_host: "0.0.0.0"
  api_port: 8000
  cors_origins:
    - "http://localhost:8090"
  api_auth_enabled: false
  heartbeat_alive_sec: 15
  api_run_maintenance: true

funding_guard:
  enabled: true
  block_new_entries_before_funding_min: 5
  block_if_abs_funding_rate_percent_above: 0.08
  reduce_position_if_abs_funding_rate_percent_above: 0.12

symbol_status:
  refresh_interval_sec: 300
  block_if_status_not_trading: true
