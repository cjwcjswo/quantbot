# Web container nginx: serve the SPA and reverse-proxy the API/WebSocket to the
# `api` service. This mirrors the Vite dev proxy (vite.config.ts): /api/* is
# stripped before reaching the API (routes are at root), /ws is passed through.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # /api/<path> -> api:8000/<path>  (trailing slash on proxy_pass strips /api).
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket dashboard stream -> api:8000/ws/... (no prefix rewrite).
    location /ws/ {
        proxy_pass http://api:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # SPA: serve static assets, fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
